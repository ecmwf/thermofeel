site_name: thermofeel
site_description: A library to calculate human thermal comfort indices
site_url: https://thermofeel.readthedocs.io/
repo_url: https://github.com/ecmwf/thermofeel
repo_name: ecmwf/thermofeel
copyright: Copyright ECMWF

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: sphinx
            show_root_heading: true
            show_source: true
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

exclude_docs: |
  requirements.txt

nav:
  - Home: index.md
  - Overview: guide/overview.md
  - Indices:
      - Apparent Temperature: guide/apparenttemperature.md
      - Heat Index: guide/heatindex.md
      - Humidex: guide/humidex.md
      - Normal Effective Temperature: guide/net.md
      - Universal Thermal Climate Index: guide/utci.md
      - Wet Bulb Globe Temperature: guide/wbgt.md
      - Heat Force (Liljegren WBGT): guide/heatforce.md
      - Wind Chill: guide/windchill.md
  - Supporting quantities:
      - Relative Humidity & Vapour Pressure: guide/relativehumidity.md
      - Mean Radiant Temperature: guide/mrt.md
  - API reference: api.md
  - Examples: examples.md
