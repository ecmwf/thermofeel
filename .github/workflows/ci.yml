name: ci

on:
  # Trigger the workflow on push to main, except tag creation
  push:
    branches:
      - 'main'
    tags-ignore:
      - '**'

  # Trigger the workflow on pull request
  pull_request: ~

  # Trigger the workflow manually
  workflow_dispatch: ~

  # Trigger after public PR approved for CI
  pull_request_target:
    types: [labeled]

jobs:
  # Run CI including downstream packages on self-hosted runners
  downstream-ci:
    name: downstream-ci
    if: ${{ !github.event.pull_request.head.repo.fork && github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci' }}
    uses: ecmwf-actions/downstream-ci/.github/workflows/downstream-ci.yml@main
    with:
      thermofeel: ecmwf/thermofeel@${{ github.event.pull_request.head.sha || github.sha }}
      # QA is handled by the dedicated `qa` job below (ruff), not the
      # downstream-ci black/isort/flake8 gate.
      python_qa: false
    secrets: inherit

  # Build downstream packages on HPC
  downstream-ci-hpc:
    name: downstream-ci-hpc
    if: ${{ !github.event.pull_request.head.repo.fork && github.event.action != 'labeled' || github.event.label.name == 'approved-for-ci' }}
    uses: ecmwf-actions/downstream-ci/.github/workflows/downstream-ci-hpc.yml@main
    with:
      thermofeel: ecmwf/thermofeel@${{ github.event.pull_request.head.sha || github.sha }}
    secrets: inherit

  # Lint and check formatting with ruff (replaces black + isort + flake8)
  qa:
    name: qa
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff lint (config in pyproject.toml)
        run: ruff check thermofeel tests
      - name: Ruff format check
        run: ruff format --check --diff thermofeel tests

  # Run the test suite with coverage and upload to Codecov
  coverage:
    name: coverage
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests with coverage
        run: pytest tests/ --cov=thermofeel --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Verify the documentation builds (MkDocs); does not publish (Read the Docs does)
  docs:
    name: docs-build
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          pip install .
      - name: Build documentation (strict)
        run: mkdocs build --strict
